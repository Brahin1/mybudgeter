<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MyBudgeter</title>
  <meta name="description" content="Offline personal budgeting — all data stays on your device.">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f6f9fc">

  <!-- iOS installed-app behavior -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MyBudgeter">

  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1 id="view-title">MyBudgeter</h1>
  </header>

  <noscript>MyBudgeter needs JavaScript — everything runs locally in your browser.</noscript>

  <main id="view" class="view"></main>

  <button id="fab" class="fab" aria-label="Add transaction" hidden>+</button>

  <nav class="tabbar" aria-label="Main navigation">
    <a href="#/home" data-tab="home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/></svg>
      <span>Home</span>
    </a>
    <a href="#/accounts" data-tab="accounts">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
      <span>Accounts</span>
    </a>
    <a href="#/transactions" data-tab="transactions">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h13m0 0-3-3m3 3-3 3"/><path d="M20 17H7m0 0 3-3m-3 3 3 3"/></svg>
      <span>Activity</span>
    </a>
    <a href="#/budgets" data-tab="budgets">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9h-9V3z"/><path d="M15 3.5A9 9 0 0 1 20.5 9H15V3.5z"/></svg>
      <span>Budgets</span>
    </a>
    <a href="#/more" data-tab="more">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      <span>More</span>
    </a>
  </nav>

  <dialog id="modal" class="modal"></dialog>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
